name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: crates/es3-web

      - name: Build CSS
        run: bun run css
        working-directory: crates/es3-web

      - name: Build
        run: cargo build --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm test runner
        run: cargo install wasm-bindgen-cli --version 0.2.122 --locked

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: crates/es3-web

      - name: Build CSS
        run: bun run css
        working-directory: crates/es3-web

      - name: Run tests
        run: cargo test --workspace --all-targets

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: crates/es3-web

      - name: Build CSS
        run: bun run css
        working-directory: crates/es3-web

      - name: Build documentation
        run: cargo doc --workspace --no-deps

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: crates/es3-web

      - name: Build CSS
        run: bun run css
        working-directory: crates/es3-web

      - name: Run fmt
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets

  audit:
    name: Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  deny:
    name: Deny
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        run: cargo deny check

  deploy-web:
    name: Deploy web app
    runs-on: ubuntu-latest
    needs: [build, test, docs, lint, audit, deny]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: crates/es3-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: ./.github/actions/rust/

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm optimizer
        run: cargo install wasm-bindgen-cli --version 0.2.122 --locked

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.9 --locked

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build CSS
        run: bun run css

      - name: Bundle web app
        run: dx bundle --web --release --base-path "${{ steps.pages.outputs.base_path }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: crates/es3-web/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
