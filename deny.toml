[graph]
all-features = true

[advisories]
ignore = [
  { id = "RUSTSEC-2023-0071", reason = "No fixed upgrade is available; rsa is pulled transitively via jsonwebtoken/restate. Revisit when upstream releases a fix." },
  { id = "RUSTSEC-2024-0436", reason = "No safe upgrade is available; paste is pulled transitively via cryptoki/kryptering. Revisit when upstream replaces paste." },
]

[licenses]
allow = [
  "Apache-2.0",
  "MIT",

  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
